networks:
  default:
    name: roboshop
    driver: bridge
    external: false

services:
  backend:
    build: ./backend
    image: mern-backend
    container_name: backend
    ports:
      - 5050:5050
    depends_on:
    - mongodb

  mongodb:
    image: mongo:7.0
    volumes:
      - mongodb:/data/db
    ports:
      - 27017:27017
    


  

  frontend:
    build: ./frontend
    image: mern-frontend
    container_name: frontend
    ports:
      - 5173:5173

volumes:
  mongodb:
    
    




